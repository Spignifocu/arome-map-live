<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>AROME · Méditerranée — Prévisions vent & météo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="map"></div>
<canvas id="particles"></canvas>

<!-- ===== Bandeau supérieur ===== -->
<header class="topbar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 40 40" width="28" height="28" aria-hidden="true">
      <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.35"/>
      <path id="compass-needle" d="M20 6 L23.2 20 L20 34 L16.8 20 Z" fill="currentColor"/>
      <circle cx="20" cy="20" r="2.4" fill="var(--bg-void)"/>
    </svg>
    <div class="brand-text">
      <span class="brand-title">AROME</span>
      <span class="brand-sub">Méditerranée · Corse — modèle PI</span>
    </div>
  </div>

  <div class="search">
    <input id="search-input" type="text" placeholder="Rechercher un lieu, un port, un spot…" autocomplete="off"/>
    <div id="search-results" class="search-results hidden"></div>
  </div>

  <div class="data-badge" title="Données de démonstration, non issues d'un run réel">
    <span class="dot"></span> DONNÉES FACTICES — PROTOTYPE
  </div>
</header>

<!-- ===== Rail de calques (droite) ===== -->
<nav class="layer-rail" aria-label="Choix du calque">
  <button class="layer-btn active" data-layer="wind" title="Vent">
    <svg viewBox="0 0 24 24"><path d="M3 8h11a3 3 0 1 0-3-3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 13h15a3 3 0 1 1-3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 18h8a2.4 2.4 0 1 0-2.4-2.4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Vent</span>
  </button>
  <button class="layer-btn" data-layer="gust" title="Rafales">
    <svg viewBox="0 0 24 24"><path d="M4 6l16-2-4 6 4 6-16-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
    <span>Rafales</span>
  </button>
  <button class="layer-btn" data-layer="temp" title="Température">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.5a3.5 3.5 0 1 0 3 0V9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="13.5" cy="17" r="1.4" fill="currentColor"/></svg>
    <span>Temp.</span>
  </button>
  <button class="layer-btn" data-layer="precip" title="Précipitations">
    <svg viewBox="0 0 24 24"><path d="M7 13a4 4 0 0 1 .7-7.94 5 5 0 0 1 9.5 1.2A3.8 3.8 0 0 1 17 13H7z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9 17l-1 3M13 17l-1 3M17 17l-1 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Pluie</span>
  </button>
</nav>

<!-- ===== Panneau point de prévision (masqué par défaut) ===== -->
<aside id="point-panel" class="point-panel hidden">
  <button id="point-close" class="point-close" aria-label="Fermer">✕</button>
  <div class="point-header">
    <div class="point-name" id="point-name">—</div>
    <div class="point-coords" id="point-coords">—</div>
  </div>
  <div class="point-now">
    <div class="point-now-main">
      <div class="point-now-value" id="point-now-value">— <span class="unit">nds</span></div>
      <div class="point-now-label" id="point-now-label">Vent moyen</div>
    </div>
    <div class="point-now-gust">
      <div class="point-now-gust-value" id="point-now-gust-value">— <span class="unit">nds</span></div>
      <div class="point-now-label">Rafales</div>
    </div>
    <div class="point-now-temp">
      <div class="point-now-temp-value" id="point-now-temp-value">— <span class="unit">°C</span></div>
      <div class="point-now-label">Température</div>
    </div>
    <div class="point-now-dir" id="point-now-dir" style="--dir:0deg">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2 L15 14 L12 22 L9 14 Z" fill="currentColor"/></svg>
    </div>
  </div>
  <canvas id="point-chart" width="280" height="90"></canvas>
  <div class="point-legend-row">
    <span><i class="sw sw-wind"></i>Vent (nds)</span>
    <span><i class="sw sw-gust"></i>Rafales</span>
  </div>
</aside>

<!-- ===== Légende (bas gauche) ===== -->
<div id="legend" class="legend">
  <div class="legend-title" id="legend-title">Vent — nœuds</div>
  <div class="legend-scale" id="legend-scale"></div>
</div>

<!-- ===== Timeline (bas) ===== -->
<footer class="timeline-dock">
  <button id="play-btn" class="play-btn" aria-label="Lecture / pause">
    <svg id="icon-play" viewBox="0 0 24 24" width="16" height="16"><path d="M6 4l14 8-14 8z" fill="currentColor"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" width="16" height="16" class="hidden"><path d="M6 4h4v16H6zM14 4h4v16h-4z" fill="currentColor"/></svg>
  </button>

  <div class="timeline-main">
    <div class="timeline-daynight" id="timeline-daynight"></div>
    <div class="timeline-fine-grid" id="timeline-fine-grid"></div>
    <div class="timeline-ruler" id="timeline-ruler"></div>
    <input type="range" id="timeline-slider" min="0" max="16" step="1" value="0" />
    <div class="timeline-cursor" id="timeline-cursor"></div>
  </div>

  <div class="run-info">
    <span class="run-label">Run</span>
    <span class="run-value" id="run-value">—</span>
    <span class="valid-time" id="valid-time">—</span>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/data-mock.js"></script>
<script src="js/data.js"></script>
<script src="js/particles.js"></script>
<script src="js/app.js"></script>
</body>
</html>
